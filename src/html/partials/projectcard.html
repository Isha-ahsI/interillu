<div class="card project-card h-100 shadow border-0">
    <div class="position-relative overflow-hidden">
        <img src="%%img" class="card-img h-100 w-100 object-fit-cover"
            alt="%%proTitle">
        <div class="card-img-overlay">
            <div class="card-content">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="badge px-2 py-1">
                        <i class="fas fa-map-marker-alt text-white me-1"></i> %%location
                    </span>
                    <button
                        class="btn btn-outline-primary btn-sm rounded-circle p-2 d-flex align-items-center justify-content-center">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
                <h5 class="card-title fw-bold mb-1 text-white">%%proTitle</h5>
                <p class="card-text text-light small mb-2">%%description</p>
                <div class="d-flex justify-content-between text-light small">
                    <span><i class="fas fa-ruler-combined me-1"></i> %%squerfit</span>
                    <span><i class="far fa-clock me-1"></i> %%timing</span>
                </div>
            </div>
        </div>
    </div>
</div>
